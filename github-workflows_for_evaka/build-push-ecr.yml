name: Simple Build and Push to ECR (dev)

# Required GitHub Environment Secrets (Settings → Environments → dev):
# - GH_ACTIONS_ROLE_ARN: IAM role ARN for OIDC authentication
#   Example: arn:aws:iam::123456789012:role/github-actions-role
# - ECR_HOST: ECR registry URL
#   Example: 123456789012.dkr.ecr.eu-north-1.amazonaws.com
# - AWS_REGION: AWS region where ECR repositories exist
#   Example: eu-north-1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: dev
    strategy:
      matrix:
        component:
          - name: dummy-idp
            context: ./dummy-idp
            repo: dummy-idp
          - name: apigw
            context: ./apigw
            repo: evaka/api-gateway
          - name: frontend
            context: ./frontend
            repo: evaka/frontend-common
            build_contexts: customizations=frontend/src/lib-customizations/espoo
            build_args: ICONS=free
          - name: service
            context: .
            dockerfile: service/Dockerfile
            repo: evaka/service
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.component.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile || format('{0}/Dockerfile', matrix.component.context) }}
          build-contexts: ${{ matrix.component.build_contexts }}
          build-args: ${{ matrix.component.build_args }}
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}
          tags: |
            ${{ secrets.ECR_HOST }}/${{ matrix.component.repo }}:${{ github.sha }}
            ${{ secrets.ECR_HOST }}/${{ matrix.component.repo }}:latest
          push: true
